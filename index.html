<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIANDU — Offline</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #04040a;
  --surface: #0b0b14;
  --surface2: #11111c;
  --border: rgba(0,229,200,0.15);
  --accent: #00e5c8;
  --accent2: #7850ff;
  --accent3: #ff4da6;
  --text: #e2f0ee;
  --text2: #6a8a85;
  --glow: 0 0 24px rgba(0,229,200,0.3);
  --glow2: 0 0 20px rgba(120,80,255,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Syne', sans-serif;
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}
body::before {
  content:''; position:fixed; inset:0;
  background-image: linear-gradient(rgba(0,229,200,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,200,0.03) 1px, transparent 1px);
  background-size: 52px 52px; pointer-events:none; z-index:0;
}
body::after {
  content:''; position:fixed; bottom:-20%; right:-10%;
  width:600px; height:600px;
  background: radial-gradient(ellipse, rgba(120,80,255,0.07) 0%, transparent 65%);
  pointer-events:none; z-index:0; animation: breathe 10s ease-in-out infinite;
}
@keyframes breathe { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.15);opacity:1} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
@keyframes slide-in { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
@keyframes bounce { 0%,80%,100%{transform:scale(.65);opacity:.4} 40%{transform:scale(1);opacity:1} }
@keyframes scan { from{top:-2px} to{top:100vh} }

.scanline {
  position:fixed; left:0; right:0; height:1px;
  pointer-events:none; z-index:3; opacity:.1;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: scan 9s linear infinite;
}

header {
  position:relative; z-index:10;
  display:flex; align-items:center; justify-content:space-between;
  padding: 14px 22px;
  border-bottom: 1px solid var(--border);
  background: rgba(4,4,10,.88); backdrop-filter: blur(14px); flex-shrink:0;
}
.logo { display:flex; align-items:center; gap:12px; }
.logo-ring {
  position:relative; width:38px; height:38px;
  display:flex; align-items:center; justify-content:center;
}
.logo-ring::before {
  content:''; position:absolute; inset:0; border-radius:50%;
  border: 1.5px solid transparent;
  border-top-color: var(--accent); border-right-color: var(--accent2);
  animation: spin 3s linear infinite;
}
.logo-ring::after {
  content:''; position:absolute; inset:6px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  border-radius:50%; box-shadow: 0 0 12px rgba(0,229,200,.4);
}
.logo-inner { position:relative; z-index:1; font-family:'Space Mono',monospace; font-size:9px; font-weight:700; color:#fff; }
.logo-name {
  font-size:19px; font-weight:800; letter-spacing:.1em;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo-tag { font-family:'Space Mono',monospace; font-size:9px; color:var(--accent); letter-spacing:.22em; opacity:.65; }
.header-right { display:flex; align-items:center; gap:10px; }
.pill {
  display:flex; align-items:center; gap:6px;
  background: rgba(0,229,200,.06); border: 1px solid rgba(0,229,200,.2);
  border-radius:100px; padding: 5px 12px;
  font-family:'Space Mono',monospace; font-size:10px; color:var(--accent); letter-spacing:.1em;
}
.pill-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 6px var(--accent); animation:blink 2.5s ease-in-out infinite; }
.btn-clear { background:transparent; border:1px solid rgba(255,77,166,.25); color:rgba(255,77,166,.7); padding:5px 12px; border-radius:6px; font-family:'Space Mono',monospace; font-size:10px; cursor:pointer; letter-spacing:.08em; transition:all .2s; }
.btn-clear:hover { border-color:var(--accent3); color:var(--accent3); }

#load-panel {
  position:relative; z-index:5; flex-shrink:0;
  border-bottom: 1px solid var(--border);
  background: rgba(4,4,10,.92);
  padding: 12px 22px;
  display:flex; align-items:center; gap:14px; flex-wrap:wrap;
}
.model-select-wrap { display:flex; align-items:center; gap:8px; font-family:'Space Mono',monospace; font-size:11px; color:var(--text2); letter-spacing:.08em; }
#model-select { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:6px; font-family:'Space Mono',monospace; font-size:11px; outline:none; cursor:pointer; }
#model-select:focus { border-color:var(--accent); }
.btn-load { background:linear-gradient(135deg,var(--accent2),#3a1daa); border:none; color:#fff; padding:7px 18px; border-radius:7px; font-family:'Space Mono',monospace; font-size:11px; font-weight:700; cursor:pointer; letter-spacing:.08em; transition:all .2s; box-shadow:var(--glow2); }
.btn-load:hover { transform:translateY(-1px); box-shadow:0 0 28px rgba(120,80,255,.5); }
.btn-load:disabled { opacity:.4; cursor:not-allowed; transform:none; }
.progress-wrap { flex:1; min-width:180px; display:none; flex-direction:column; gap:4px; }
.progress-wrap.vis { display:flex; }
.progress-bg { height:4px; border-radius:2px; background:rgba(0,229,200,.1); overflow:hidden; }
.progress-fill { height:100%; border-radius:2px; width:0%; background:linear-gradient(90deg,var(--accent2),var(--accent)); transition:width .3s ease; box-shadow:0 0 8px var(--accent); }
.progress-txt { font-family:'Space Mono',monospace; font-size:10px; color:var(--text2); letter-spacing:.05em; }
.status-badge { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.1em; padding:5px 10px; border-radius:5px; }
.status-badge.ok { background:rgba(0,229,200,.08); border:1px solid rgba(0,229,200,.25); color:var(--accent); }
.status-badge.err { background:rgba(255,77,166,.08); border:1px solid rgba(255,77,166,.25); color:var(--accent3); }

#messages { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:18px; position:relative; z-index:1; scroll-behavior:smooth; }
#messages::-webkit-scrollbar { width:3px; }
#messages::-webkit-scrollbar-thumb { background:rgba(0,229,200,.15); border-radius:2px; }

.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; height:100%; opacity:.4; pointer-events:none; text-align:center; padding:40px; }
.orbit { position:relative; width:72px; height:72px; }
.orbit-r { position:absolute; inset:0; border-radius:50%; border:1px solid rgba(0,229,200,.4); animation:spin 8s linear infinite; }
.orbit-r:nth-child(2) { inset:10px; border-color:rgba(120,80,255,.4); animation-duration:5s; animation-direction:reverse; }
.orbit-c { position:absolute; inset:22px; background:linear-gradient(135deg,var(--accent2),var(--accent)); border-radius:50%; box-shadow:0 0 16px rgba(0,229,200,.5); }
.empty-state h3 { font-size:13px; font-weight:600; letter-spacing:.2em; color:var(--text2); }
.empty-state p { font-family:'Space Mono',monospace; font-size:11px; color:var(--text2); opacity:.6; line-height:1.9; }

.msg { display:flex; gap:11px; max-width:800px; width:100%; margin:0 auto; animation:slide-in .3s ease; }
.msg.user { flex-direction:row-reverse; }
.avatar { width:30px; height:30px; border-radius:7px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-family:'Space Mono',monospace; font-size:9px; font-weight:700; margin-top:2px; }
.msg.user .avatar { background:linear-gradient(135deg,var(--accent3),#aa1060); color:#fff; }
.msg.ai .avatar { background:linear-gradient(135deg,var(--accent2),var(--accent)); color:#fff; }
.bubble { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:13px 17px; font-size:14px; line-height:1.78; max-width:calc(100% - 42px); overflow-wrap:break-word; word-break:break-word; }
.msg.user .bubble { background:rgba(120,80,255,.1); border-color:rgba(120,80,255,.25); }
.bubble pre { background:var(--bg); border:1px solid var(--border); border-radius:7px; padding:12px; overflow-x:auto; font-family:'Space Mono',monospace; font-size:12px; line-height:1.6; margin:10px 0; }
.bubble code { font-family:'Space Mono',monospace; font-size:12px; background:rgba(0,229,200,.1); padding:2px 5px; border-radius:4px; color:var(--accent); }
.bubble pre code { background:none; padding:0; color:var(--text); }
.typing-dots { display:flex; gap:5px; align-items:center; padding:4px 0; }
.typing-dots span { width:7px; height:7px; border-radius:50%; animation:bounce 1.2s ease-in-out infinite; }
.typing-dots span:nth-child(1){background:var(--accent)}
.typing-dots span:nth-child(2){background:var(--accent2);animation-delay:.2s}
.typing-dots span:nth-child(3){background:var(--accent3);animation-delay:.4s}

.input-area { position:relative; z-index:10; flex-shrink:0; padding:14px 16px; border-top:1px solid var(--border); background:rgba(4,4,10,.94); backdrop-filter:blur(14px); }
.input-row { display:flex; align-items:flex-end; gap:10px; max-width:800px; margin:0 auto; }
#user-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:11px; color:var(--text); font-family:'Syne',sans-serif; font-size:14px; padding:12px 16px; resize:none; outline:none; transition:border-color .2s,box-shadow .2s; line-height:1.5; min-height:48px; max-height:140px; overflow-y:auto; }
#user-input::placeholder { color:var(--text2); opacity:.5; }
#user-input:focus { border-color:var(--accent); box-shadow:var(--glow); }
#user-input:disabled { opacity:.35; cursor:not-allowed; }
.btn-send { width:44px; height:44px; flex-shrink:0; background:linear-gradient(135deg,var(--accent2),#3a1daa); border:none; border-radius:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; box-shadow:var(--glow2); }
.btn-send:hover { transform:translateY(-2px); box-shadow:0 0 28px rgba(120,80,255,.55); }
.btn-send:active { transform:scale(.95); }
.btn-send:disabled { opacity:.35; cursor:not-allowed; transform:none; }
.btn-send svg { width:17px; height:17px; fill:#fff; }
.input-hint { text-align:center; margin-top:7px; font-family:'Space Mono',monospace; font-size:10px; color:var(--text2); opacity:.35; letter-spacing:.07em; }

@media(max-width:600px) {
  header{padding:10px 14px} .logo-name{font-size:16px} .logo-tag{display:none}
  #load-panel{padding:10px 14px;gap:10px} #messages{padding:14px 10px} .input-area{padding:10px}
}
</style>
</head>
<body>

<div class="scanline"></div>

<header>
  <div class="logo">
    <div class="logo-ring"><span class="logo-inner">AI</span></div>
    <div>
      <div class="logo-name">AIANDU</div>
      <div class="logo-tag">100% OFFLINE · NO API KEY</div>
    </div>
  </div>
  <div class="header-right">
    <div class="pill"><div class="pill-dot"></div><span>LOCAL</span></div>
    <button class="btn-clear" onclick="clearChat()">✕ CLEAR</button>
  </div>
</header>

<div id="load-panel">
  <div class="model-select-wrap">
    <span>MODEL</span>
    <select id="model-select">
      <option value="Xenova/TinyLlama-1.1B-Chat-v1.0" selected>TinyLlama 1.1B (637MB) — ringan &amp; cepat</option>
      <option value="Xenova/Qwen1.5-0.5B-Chat">Qwen 0.5B (370MB) — paling kecil</option>
      <option value="Xenova/Phi-3-mini-4k-instruct">Phi-3 Mini (2.3GB) — paling pintar</option>
    </select>
  </div>
  <button class="btn-load" id="btn-load" onclick="loadModel()">⬇ LOAD MODEL</button>
  <div class="progress-wrap" id="prog-wrap">
    <div class="progress-bg"><div class="progress-fill" id="prog-fill"></div></div>
    <div class="progress-txt" id="prog-txt">Mempersiapkan...</div>
  </div>
  <div id="model-badge"></div>
</div>

<div id="messages">
  <div class="empty-state" id="empty">
    <div class="orbit">
      <div class="orbit-r"></div><div class="orbit-r"></div><div class="orbit-c"></div>
    </div>
    <h3>AIANDU OFFLINE MODE</h3>
    <p>Pilih model lalu klik LOAD MODEL.<br>Download sekali pakai internet,<br>setelah itu jalan tanpa internet selamanya.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="user-input" placeholder="Load model dulu, lalu ketik pesanmu..." rows="1" disabled></textarea>
    <button class="btn-send" id="btn-send" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-hint">SHIFT+ENTER baris baru · ENTER kirim · AI jalan 100% lokal di browser kamu</div>
</div>

<script type="module">
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js';

env.allowLocalModels = false;
env.useBrowserCache = true;

let generator = null;
let isGenerating = false;
let chatHistory = [];

const msgsEl = document.getElementById('messages');
const emptyEl = document.getElementById('empty');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('btn-send');
const loadBtn = document.getElementById('btn-load');
const progWrap = document.getElementById('prog-wrap');
const progFill = document.getElementById('prog-fill');
const progTxt = document.getElementById('prog-txt');
const badge = document.getElementById('model-badge');
const modelSel = document.getElementById('model-select');

window.loadModel = async () => {
  loadBtn.disabled = true;
  progWrap.classList.add('vis');
  badge.innerHTML = '';

  const id = modelSel.value;
  const name = modelSel.options[modelSel.selectedIndex].text.split('(')[0].trim();

  try {
    progTxt.textContent = `Mengunduh ${name}... (butuh internet pertama kali)`;
    generator = await pipeline('text-generation', id, {
      progress_callback: p => {
        if (p.status === 'downloading' || p.status === 'progress') {
          const pct = p.progress ? Math.round(p.progress) : 0;
          progFill.style.width = pct + '%';
          const mb = p.loaded ? (p.loaded/1024/1024).toFixed(1) : '?';
          const tot = p.total ? (p.total/1024/1024).toFixed(1) : '?';
          progTxt.textContent = `${p.file || 'file'}... ${mb} / ${tot} MB`;
        } else if (p.status === 'loading') {
          progFill.style.width = '92%';
          progTxt.textContent = 'Memuat ke memori...';
        }
      }
    });

    progWrap.classList.remove('vis');
    progFill.style.width = '0%';
    badge.innerHTML = `<span class="status-badge ok">✓ ${name} SIAP</span>`;
    inputEl.disabled = false;
    sendBtn.disabled = false;
    inputEl.placeholder = 'Tanya apapun... AI jalan 100% di browser kamu';
    inputEl.focus();
    addMsg('ai', `Halo! Saya **${name}**, siap membantu secara offline. Tanya apapun ya!`);
  } catch(e) {
    progWrap.classList.remove('vis');
    badge.innerHTML = `<span class="status-badge err">✗ Gagal: ${e.message}</span>`;
    loadBtn.disabled = false;
    console.error(e);
  }
};

window.sendMessage = async () => {
  const text = inputEl.value.trim();
  if (!text || isGenerating || !generator) return;

  isGenerating = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  addMsg('user', text);
  chatHistory.push({ role:'user', content:text });

  const tid = addTyping();

  try {
    // Build prompt — format ChatML / TinyLlama
    const recent = chatHistory.slice(-8);
    let prompt = '<|system|>\nKamu adalah AIANDU, asisten AI yang cerdas. Jawab dalam bahasa Indonesia, singkat dan jelas.\n</s>\n';
    for (const t of recent) {
      if (t.role === 'user') prompt += `<|user|>\n${t.content}\n</s>\n<|assistant|>\n`;
      else prompt += `${t.content}\n</s>\n`;
    }

    const out = await generator(prompt, {
      max_new_tokens: 400,
      temperature: 0.7,
      top_p: 0.9,
      repetition_penalty: 1.15,
      do_sample: true,
    });

    removeTyping(tid);

    let reply = out[0].generated_text;
    const idx = reply.lastIndexOf('<|assistant|>');
    reply = idx !== -1 ? reply.slice(idx + 13) : reply.slice(prompt.length);
    reply = reply.replace(/<\|[^|]+\|>/g,'').replace(/<\/s>/g,'').trim();
    if (!reply) reply = '(Tidak ada respons — coba ulangi pertanyaan.)';

    chatHistory.push({ role:'assistant', content:reply });
    addMsg('ai', reply);
  } catch(e) {
    removeTyping(tid);
    addMsg('ai', `⚠️ Error: ${e.message}`);
  }

  isGenerating = false;
  sendBtn.disabled = false;
  inputEl.focus();
};

window.clearChat = () => {
  chatHistory = [];
  msgsEl.querySelectorAll('.msg').forEach(m => m.remove());
  emptyEl.style.display = 'flex';
};

function addMsg(role, content) {
  emptyEl.style.display = 'none';
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = role === 'user' ? 'YOU' : 'NX';
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = role === 'ai' ? md(content) : esc(content);
  d.appendChild(av); d.appendChild(b);
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function addTyping() {
  emptyEl.style.display = 'none';
  const id = 'ty' + Date.now();
  const d = document.createElement('div');
  d.className = 'msg ai'; d.id = id;
  const av = document.createElement('div');
  av.className = 'avatar'; av.textContent = 'NX';
  const b = document.createElement('div');
  b.className = 'bubble';
  b.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  d.appendChild(av); d.appendChild(b);
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return id;
}

function removeTyping(id) { document.getElementById(id)?.remove(); }

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function md(t) {
  t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, (_,c) => `<pre><code>${esc(c.trim())}</code></pre>`);
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/^### (.+)$/gm, '<h3 style="font-size:14px;font-weight:600;color:var(--accent);margin:10px 0 4px">$1</h3>');
  t = t.replace(/^## (.+)$/gm, '<h2 style="font-size:16px;font-weight:700;color:var(--accent2);margin:12px 0 5px">$1</h2>');
  t = t.replace(/^[-*] (.+)$/gm, '<li style="margin:3px 0;padding-left:2px">$1</li>');
  t = t.replace(/(<li[^>]*>[\s\S]*?<\/li>)+/g, s => `<ul style="padding-left:18px;margin:8px 0">${s}</ul>`);
  t = t.replace(/\n\n+/g, '</p><p style="margin:8px 0">');
  t = t.replace(/\n/g, '<br>');
  return `<p style="margin:0">${t}</p>`;
}

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
